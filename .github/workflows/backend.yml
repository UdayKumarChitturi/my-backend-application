name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via Frontend
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Connected to frontend"
          
            ssh -o StrictHostKeyChecking=no ec2-user@10.0.1.254 << 'EOF'
              cd ~/my-backend-application
              git pull origin main
              pkill node || true
              nohup node app.js > output.log 2>&1 &
            EOF
